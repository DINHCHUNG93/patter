version: 2
updates:
  # Python SDK
  - package-ecosystem: "pip"
    directory: "/libraries/python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # TypeScript SDK
  - package-ecosystem: "npm"
    directory: "/libraries/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Dashboard SPA
  - package-ecosystem: "npm"
    directory: "/dashboard-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
